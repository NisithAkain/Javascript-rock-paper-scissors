<!DOCTYPE html>
<html>
    <head>
        <style>
            .title {
                font-family: Arial;
                font-size: 30px;
                text-align: center;
                margin: 30px;
            }

            .results-container{
                margin-top:100px; 
                border-radius: 15px;
                padding-left: 10px;
                padding-right: 10px;
                margin-left: 20px;
                margin-right: 20px;
                display: grid;
                grid-template-columns: 1fr ;
                height: 200px;
                background-color: lightgrey;
                align-items: start;
            }
            .choices-container {
                border-radius: 15px;
                padding-left: 10px;
                padding-right: 10px;
                margin-left: 20px;
                margin-right: 20px;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                height: 75px;
                background-color: lightgrey;
                align-items: center;
                transition:margin-left 0.13s , margin-right 0.13s;
            }
            .choices-container:hover{
                margin-left: 5px;
                margin-right: 5px;
            }

            .chose-buttons {
                height: 30px;
                background-color: black;
                color: white;
                border: none;
                cursor: pointer;
                border-radius: 10px;
                opacity: 1;
                transition: opacity 0.13s;
            }

            .chose-buttons:hover {
                opacity: 0.6;
            }

            .chose-buttons:first-child {
                margin-right: 30px;
            }

            .chose-buttons:last-child {
                margin-left: 30px;
            }

            .reset-container {
                display: grid;
                align-items: center;
                justify-items: center;
                margin-top: 42px;
                margin-left: 20px;
                margin-right: 20px;
            }

            .reset-score {
                text-align: center;
                width: 65%;
                height: 30px;
                background-color: lightcoral;
                color: white;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                opacity: 1;
                transition: opacity 0.13s;
            }
 
            .reset-score:hover {
                opacity: 0.6;
            }
        </style>
    </head>
    <body style="margin: 50px auto 0; max-width: 700px;">
        <div>

        <p class="title">Rock Paper Sissors</p>
        <div class="choices-container">
            <button class="chose-buttons" onclick="playGame('scissors')">Scissors</button>
            <button class="chose-buttons" onclick="playGame('rock')">Rock</button>
            <button class="chose-buttons" onclick="playGame('paper')">Paper</button>
        </div>

        <div class="reset-container">
            <button class="reset-score" onclick="score.wins=0; score.losses=0;
             score.draws=0;
              localStorage.removeItem('score'); 
              alert('score has been reset by user');
              localStorage.removeItem('score');"
              >Reset Score</button>
        </div>
    
        
        <div class="results-container">
           <p style = "font-size: 20px; font-family:Arial; margin-bottom: 0px; ">Results:</p>
           <div style = " margin-top:0px">
                <p style = "font-family: Arial; font-size: 15px; font-weight: bold;" class = "general-results">
                    
                </p>
                <p  style = "font-family: Arial; font-size: 15px;" class = "chosen-values">
                    
                </p >

                <p style = "font-family: Arial; font-size: 15px;" class = "exact-results">
                    
                </p>
           </div>
        </div>

        <script>
            let score = JSON.parse(localStorage.getItem('score')) || {
                wins:0,
                losses:0,
                draws:0
            };

            function playGame(playerChoice) {
                const randomNumber = Math.random();
                let computerChoice;

                if (randomNumber < 1/3) {
                    computerChoice = 'scissors';
                } else if (randomNumber < 2/3) {
                    computerChoice = 'rock';
                } else {
                    computerChoice = 'paper';
                }

                let result;
                if (playerChoice === computerChoice) {
                    result = 'Draw!';
                    score.draws += 1;
                } else if (
                    (playerChoice === 'scissors' && computerChoice === 'paper') ||
                    (playerChoice === 'rock'     && computerChoice === 'scissors') ||
                    (playerChoice === 'paper'    && computerChoice === 'rock')
                ) {
                    result = 'You win!';
                    score.wins += 1;
                } else {
                    result = 'You lose!';
                    score.losses += 1;
                }
                localStorage.setItem('score', JSON.stringify(score));

                /*alert(`You chose ${playerChoice}, computer chose ${computerChoice}. ${result} 
                | Wins: ${score.wins}, Losses: ${score.losses}, Draws: ${score.draws}`);*/

                let  JSgeneralResults = document.querySelector('.general-results');
                JSgeneralResults.innerText = `${result}`; 

                let  JSexactResults = document.querySelector('.exact-results');
                JSexactResults.innerText = ` Wins: ${score.wins}, Losses: ${score.losses}, Draws: ${score.draws}`;  

                let JSchosenValues =  document.querySelector('.chosen-values');
                JSchosenValues.innerText = `you chose ${playerChoice}, computer chose ${computerChoice} `;
            }
        </script>
        </div>
    </body>
</html>
